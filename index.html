<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Shadows of Rivendell — A Pixel-Art Might & Magic Tale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <div id="frame">
      <canvas id="screen" width="320" height="240"></canvas>
      <div id="hud">
        <div id="party"></div>
        <div id="log"></div>
      </div>
      <div id="overlay" class="hidden"></div>
    </div>
    <div id="controls">
      <span><b>Move</b> WASD / Arrows</span>
      <span><b>Interact</b> E / Space</span>
      <span><b>Inventory</b> I</span>
      <span><b>Party</b> C</span>
      <span><b>Save</b> F5</span>
      <span><b>Load</b> F9</span>
    </div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
